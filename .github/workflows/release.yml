name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained exe
        run: |
          dotnet publish src/GHelperRemote.Web -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./release

      - name: Create release zip
        run: |
          Compress-Archive -Path ./release/GHelperRemote.Web.exe, ./release/appsettings.json, ./release/wwwroot, ./scripts -DestinationPath ./GHelperRemote-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GHelperRemote-win-x64
          path: ./GHelperRemote-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./GHelperRemote-win-x64.zip
          generate_release_notes: true
